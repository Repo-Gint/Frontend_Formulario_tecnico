<!-- Section: Design Block -->
<section class="text-center">
  <!-- Background image -->
  <div
  class="p-5 bg-image"
  style="
    background-image: url('/assets/images/fondo_login.jpg');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    height: 300px;">
</div>
  <!-- Background image -->
  <div class="card mx-4 mx-md-5 shadow-5-strong bg-body-tertiary" style="margin-top: -100px;
        backdrop-filter: blur(30px);">
    <div class="card-body py-5 px-md-5">

      <div class="row d-flex justify-content-center">
        <div class="col-lg-8">
          <h2 class="fw-bold mb-5">Iniciar Sesión</h2>
          <form [formGroup]="formLogin" autocomplete="off">

                            <div class="form-floating mb-3">
                                <input class="form-control" type="email" formControlName="email">
                                <label>Correo</label>
                            </div>

                            <div class="form-floating mb-3">
                                <input class="form-control" type="password" formControlName="password">
                                <label>Contraseña</label>
                            </div>

                            <div class="d-grid">
                                <button class="btn btn-warning" (click)="iniciarSesion()">
                                    Iniciar Sesión
                                </button>
                            </div>

                        </form>
        </div>
      </div>
    </div>
  </div>
</section>
<!-- Section: Design Block -->
