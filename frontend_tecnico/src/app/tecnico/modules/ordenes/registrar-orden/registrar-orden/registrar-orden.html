<div class="modal-body dashboard">
    <div class="pagetitle">
        <h4 class="t-bold">{{ idOrden == null ? 'Registrar' : 'Actualizar' }} Orden</h4>
        <nav>
            <ol class="breadcrumb">
                <li class="breadcrumb-item">Órdenes</li>
                <li class="breadcrumb-item active">{{ idOrden == null ? 'Registrar' : 'Actualizar' }} Orden</li>
            </ol>
        </nav>
    </div>

    <div class="row">
        <div class="col-12">
            <div class="card">
                <div class="card-body">
                    <form [formGroup]="formOrden" class="row g-3" autocomplete="off">

                        <!-- ENGINEER -->
                        <div class="col-6">
                            <label>Ingeniero</label>
                            <input class="form-control form-control-sm" formControlName="enginner">
                        </div>

                        <!-- Espaciador para completar la fila si es necesario o mover elementos -->
                        <div class="col-6"></div>

                        <!-- CUSTOMER -->
                        <div formGroupName="customer" class="row g-3 m-0">
                            <div class="col-6">
                                <label class="form-label">Compañía:</label>
                                <input type="text" class="form-control form-control-sm" formControlName="company">
                            </div>
                            <div class="col-6">
                                <label class="form-label">Solicitado por:</label>
                                <input type="text" class="form-control form-control-sm" formControlName="customer">
                            </div>
                            <div class="col-6">
                                <label class="form-label">Puesto:</label>
                                <input type="text" class="form-control form-control-sm" formControlName="position">
                            </div>
                            <div class="col-6">
                                <label class="form-label">Correo:</label>
                                <input type="email" class="form-control form-control-sm"
                                    formControlName="email_customer">
                            </div>
                            <div class="col-12">
                                <label class="form-label">Dirección:</label>
                                <input type="text" class="form-control form-control-sm" formControlName="address">
                            </div>
                        </div>

                        <!-- EQUIPMENT -->
                        <div formGroupName="equipment" class="row g-3 m-0">
                            <div class="col-6">
                                <label class="form-label">Modelo:</label>
                                <input type="text" class="form-control form-control-sm" formControlName="model">
                            </div>
                            <div class="col-6">
                                <label class="form-label">Número de Serie:</label>
                                <input type="text" class="form-control form-control-sm" formControlName="serial_number">
                            </div>
                            <div class="col-6">
                                <label class="form-label">Año:</label>
                                <input type="text" class="form-control form-control-sm" formControlName="year">
                            </div>
                            <div class="col-6">
                                <label class="form-label">Total de horas de Trabajo:</label>
                                <input type="text" class="form-control form-control-sm"
                                    formControlName="work_hours_total">
                            </div>
                        </div>

                        <!-- Tipo de Orden -->
                        <div class="mb-3">
                            <label class="form-label fw-bold">Tipo de Orden:</label>

                            <div class="row">
                                <div class="col-md-3" *ngFor="let tipo of listatipoOrden">
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox"
                                            [id]="'tipo_' + tipo.id_type_order" (change)="selectTipo($event, tipo)">

                                        <label class="form-check-label" [for]="'tipo_' + tipo.id_type_order">

                                            {{ tipo.type_order }}

                                        </label>
                                    </div>
                                </div>
                            </div>
                        </div>


                        <!-- Working Hours Table - Ajustado al diseño de image_954387.png -->
                        <div class="col-12 mt-4" [formGroup]="form">
                            <!-- Botón Global Agregar Semana -->
                            <div class="d-flex justify-content-between align-items-center bg-light p-2 border">
                                <h6 class="m-0"><strong>Working Hours Table</strong></h6>
                                <button type="button" class="btn btn-primary" (click)="addSemana()">+ Add Week</button>
                            </div>

                            <!-- Contenedor de Semanas -->
                            <div formArrayName="semanas">
                                <div *ngFor="let semana of semanas.controls; let i = index" [formGroupName]="i"
                                    class="card mt-4 border-primary">

                                    <!-- Encabezado Semana -->
                                    <div
                                        class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
                                        <span>Semana {{ i + 1 }}</span>
                                        <div>
                                            <button type="button" class="btn btn-sm btn-light me-2"
                                                (click)="addDay(i)">+ Add Day</button>
                                            <button type="button" class="btn btn-sm btn-danger"
                                                (click)="removeSemana(i)">Eliminar Semana</button>
                                        </div>
                                    </div>

                                    <!-- Tabla de Días -->
                                    <div class="table-responsive">
                                        <table class="table table-bordered table-sm text-center align-middle">
                                            <thead class="table-primary text-white">
                                                <tr>
                                                    <th rowspan="2">DATES (Day)</th>
                                                    <th rowspan="2">MONTH / DD</th>
                                                    <th colspan="2">INCOMING</th>
                                                    <th colspan="3">WORK</th>
                                                    <th colspan="2">OUTGOING</th>
                                                    <th rowspan="2">TRAVEL TIME</th>
                                                    <th rowspan="2">ACC</th>
                                                </tr>
                                                <tr>
                                                    <th>DEPARTURE</th>
                                                    <th>ARRIVAL</th>
                                                    <th>START</th>
                                                    <th>FINISH</th>
                                                    <th>WORKING HOURS</th>
                                                    <th>DEPARTURE</th>
                                                    <th>ARRIVAL</th>
                                                </tr>
                                            </thead>
                                            <tbody formArrayName="dias">
                                                <tr *ngFor="let day of getDias(i).controls; let j = index"
                                                    [formGroupName]="j">

                                                    <!-- Columna Día y Fecha -->
                                                    <td>
                                                        <select class="form-control form-control-sm"
                                                            formControlName="date">
                                                            <option value="">--</option>
                                                            <option *ngFor="let fecha of listafechas"
                                                                [value]="fecha.date_name">{{ fecha.day_name }}</option>
                                                        </select>
                                                    </td>
                                                    <td><input type="text" class="form-control form-control-sm"
                                                            formControlName="month"></td>

                                                    <!-- INCOMING (TRIP) -->
                                                    <ng-container formGroupName="trip">
                                                        <td><input class="form-control form-control-sm" type="time"
                                                                formControlName="start_trip"></td>
                                                        <td><input class="form-control form-control-sm" type="time"
                                                                formControlName="arrival_trip"></td>
                                                    </ng-container>

                                                    <!-- WORK -->
                                                    <ng-container formGroupName="work">
                                                        <td><input class="form-control form-control-sm" type="time"
                                                                formControlName="work_start"></td>
                                                        <td><input class="form-control form-control-sm" type="time"
                                                                formControlName="work_finish"></td>
                                                        <td><input class="form-control form-control-sm" type="number"
                                                                formControlName="work_hours"></td>
                                                    </ng-container>

                                                    <!-- OUTGOING (TRIP) -->
                                                    <ng-container formGroupName="trip">
                                                        <td><input class="form-control form-control-sm" type="time"
                                                                formControlName="out_departure"></td>
                                                        <td><input class="form-control form-control-sm" type="time"
                                                                formControlName="out_arrival"></td>
                                                        <td><input class="form-control form-control-sm" type="text"
                                                                formControlName="travel_time"></td>
                                                    </ng-container>

                                                    <!-- ACC / BORRAR DÍA -->
                                                    <td>
                                                        <button type="button" class="btn btn-danger btn-sm"
                                                            (click)="removeDay(i, j)">X</button>
                                                    </td>
                                                </tr>
                                            </tbody>
                                        </table>
                                    </div>

                                    <!-- Campo Comentarios por Semana -->
                                    <div class="p-2">
                                        <textarea class="form-control form-control-sm" formControlName="comments"
                                            placeholder="Add comments here..."></textarea>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <!-- Objetivo y Firma -->
                        <div class="col-12 mt-4">
                            <label><strong>Objective:</strong></label>
                            <textarea class="form-control" rows="3" formControlName="final_goal"></textarea>
                        </div>

                        <div class="col-12 mt-3">
                            <div class="row">
                                <div class="col-lg-6">
                                    <div class="d-flex justify-content-between">
                                        <label><strong>Signature / Stamp Area (Usa el Lápiz o Mouse)</strong></label>
                                        <button type="button" class="btn btn-sm btn-outline-danger"
                                            (click)="limpiarFirma()">Limpiar</button>
                                    </div>
                                    <canvas #sigCanvas class="border w-100"
                                        style="height: 150px; cursor: crosshair; background: #f9f9f9;"></canvas>
                                </div>
                                <div class="col-lg-6">
                                    <label><strong>Ort / Place</strong></label>
                                    <input type="text" class="form-control mb-2" formControlName="place">
                                    <label><strong>Datum / Date</strong></label>
                                    <input type="date" class="form-control">
                                </div>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal-footer">
    <button *ngIf="idOrden == null" class="btn btn-sm btn-primary" (click)="registrarOrden()">Registrar</button>
    <button class="btn btn-sm btn-danger" (click)="cerrarModal()">{{ idOrden != null ? 'Cancelar' : 'Cerrar' }}</button>
</div>
